version: 1

# AI-slop quality policy for the napplet monorepo.
#
# Most findings are fixed in code (security advisories, dead code, empty bodies,
# narrative comments). The rule tunings below reflect *intentional* conventions
# of this codebase (see AGENTS.md / CLAUDE.md) rather than slop to be removed.

quality:
  # A few modules are intentionally large, comprehensive single-source-of-truth
  # files: the core protocol type catalog and the SDK barrel/facade. The default
  # 400-line ceiling still applies pressure to everything else.
  maxFileLoc: 1600

rules:
  # NUB packages are deliberately self-contained: each NAP domain module owns its
  # own protocol types so the subpath is independently usable without reaching
  # into @napplet/core. Some scalar/shape types therefore mirror core on purpose.
  ai-slop/duplicate-type-declaration: off

  # The only URLs flagged are the site's own public canonical domain and reserved
  # example.com test fixtures — not secrets or environment-specific configuration.
  ai-slop/hardcoded-url: off

  # The flagged "duplicate blocks" are static config data (the package list) and
  # intentionally explicit, per-message wire interfaces / domain method maps. The
  # project prefers explicit declarations over premature abstraction.
  code-quality/duplicate-block: off
