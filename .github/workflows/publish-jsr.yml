name: Publish to JSR

# JSR publish runs INDEPENDENTLY of the npm Publish workflow so a broken
# npm token or scope-permission issue does not block JSR releases. JSR uses
# OIDC (id-token: write) for auth — no secret required once napplet/napplet
# is linked under the @napplet scope on jsr.io.
#
# Trigger model:
# - Fires on push to main, but the publish job only runs for Version Packages
#   merge commits. Ordinary feature PR merges still contain unconsumed
#   changesets and may have stale jsr.json dependency pins until the generated
#   Version Packages PR lands.
# - Manual workflow_dispatch is also wired for one-off bootstrap publishes
#   (e.g. the first @napplet/core@0.3.0 push after the scope was created).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-jsr:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'Version Packages')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write enables JSR's OIDC-based publish. Once napplet/napplet
      # is linked under the @napplet scope at jsr.io/@napplet/settings, this
      # is the only auth needed — no JSR_TOKEN secret required.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: denoland/setup-deno@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Idempotent — copies each packages/*/package.json#version into the
      # sibling JSR package config version. Most packages use jsr.json;
      # @napplet/cli is Deno-first and publishes from deno.json. Catches
      # the case where someone bumped package.json by hand without
      # re-running `pnpm version-packages`.
      - name: Sync jsr.json versions
        run: node scripts/sync-jsr-versions.mjs

      # `pnpm -r exec` runs in topological order (respects workspace deps),
      # so @napplet/core publishes before @napplet/nap, which publishes before
      # @napplet/sdk + @napplet/shim, which publish before @napplet/vite-plugin.
      # Each package's `npx jsr publish` resolves prior packages from JSR's
      # newly-populated registry.
      #
      # --workspace-concurrency=1 is REQUIRED: pnpm's default recursive
      # concurrency runs the `npx jsr` invocations in parallel, which both
      # (a) lets JSR reject dependents whose dependencies aren't on the registry
      # yet, and (b) makes concurrent `npx jsr` processes race on the shared npx
      # binary-download cache (ENOENT renaming the deno .zip.part). Serializing
      # to concurrency 1 runs packages strictly in topological order and fixes both.
      #
      # --allow-slow-types: relaxes JSR's strict type-inference checks until
      # we tighten public type exports later (tracked separately).
      # --allow-dirty: tolerates the sync step's jsr.json edits without
      # requiring a follow-up commit.
      # @napplet/cli publishes to JSR from deno.json only; it is intentionally
      # excluded from npm publishing in the Publish workflow. @napplet/boilerplate
      # (npx CLI generator) and @napplet/conformance-cli (Playwright-backed runner)
      # are published to npm only, so they are excluded from the JSR publish set.
      # The pure @napplet/conformance engine still publishes to JSR.
      - name: Publish to JSR (topologically ordered)
        run: pnpm -r --workspace-concurrency=1 --filter='./packages/*' --filter='!@napplet/boilerplate' --filter='!@napplet/conformance-cli' exec npx jsr publish --allow-slow-types --allow-dirty

  build-cli-binaries:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'Version Packages')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: compile:linux-x86_64
            asset: napplet-linux-x86_64
          - task: compile:linux-aarch64
            asset: napplet-linux-aarch64
          - task: compile:darwin-x86_64
            asset: napplet-darwin-x86_64
          - task: compile:darwin-aarch64
            asset: napplet-darwin-aarch64
          - task: compile:windows-x86_64
            asset: napplet-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: Compile ${{ matrix.asset }}
        run: deno task --config packages/cli/deno.json ${{ matrix.task }}
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ strategy.job-index }}
          path: packages/cli/dist/${{ matrix.asset }}
          if-no-files-found: error

  release-cli-binaries:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'Version Packages')
    needs: [publish-jsr, build-cli-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-dist
          merge-multiple: true
      - name: Create checksum manifest
        working-directory: cli-dist
        run: sha256sum napplet-* | sort > SHA256SUMS
      - name: Publish versioned and stable CLI assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          version_tag="@napplet/cli@${version}"
          if ! gh release view "$version_tag" >/dev/null 2>&1; then
            gh release create "$version_tag" --title "$version_tag" --notes "Standalone napplet CLI ${version}."
          fi
          gh release upload "$version_tag" cli-dist/napplet-* cli-dist/SHA256SUMS --clobber

          if ! gh release view napplet-cli >/dev/null 2>&1; then
            gh release create napplet-cli --title "napplet CLI (stable)" --notes "Rolling checksum-verified standalone CLI binaries." --latest=false
          fi
          gh release upload napplet-cli cli-dist/napplet-* cli-dist/SHA256SUMS --clobber
