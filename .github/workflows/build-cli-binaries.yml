name: Build CLI Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'cli-v*'

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: node20-linux-x64
            asset: napplet-linux-x64
          - target: node20-macos-x64
            asset: napplet-macos-x64
          - target: node20-macos-arm64
            asset: napplet-macos-arm64
          - target: node20-win-x64
            asset: napplet-win-x64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @napplet/cli build
      - run: mkdir -p artifacts
      - run: npx -y @yao-pkg/pkg@6.6.0 packages/cli/dist/bin.cjs --targets ${{ matrix.target }} --output artifacts/${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: artifacts/${{ matrix.asset }}
