name: AI Slop Score

# Runs the AI-slop quality gate via the sandwichfarm/aislop-badge composite
# action: scan the repo, write the Shields endpoint badge JSON, and (on main)
# commit the badge back. Replaces the previous hand-rolled scan/badge/enforce
# jobs. The badge commit pushes to main, so github-actions[bot] must be on the
# main ruleset bypass list.

"on":
  push:
    branches:
      - main
    paths-ignore:
      - ".github/badges/aislop-score.json"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aislop:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: AI slop scan + badge
        id: badge
        uses: sandwichfarm/aislop-badge@v1
        with:
          aislop-version: "0.12.0"
          badge-file: .github/badges/aislop-score.json
          # Gate on the score so genuine code-slop regressions fail the run, but
          # don't hard-fail on aislop's non-zero exit: the only non-code findings
          # are external dependency advisories (a live, moving target) and the
          # in-repo engines (formatting, quality, ai-slop, linting) are clean.
          minimum-score: "70"
          fail-on-error: "false"
          # Commit the badge only on a direct push to main (never from PRs).
          commit-badge: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
