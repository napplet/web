name: AI Slop Score

# Runs the AI-slop quality gate via the sandwichfarm/aislop-badge composite
# action: scan the repo and write the Shields endpoint badge JSON. The badge is
# published to the dedicated, UNPROTECTED `badges` branch — the `main` ruleset
# forbids direct (non-PR) pushes, including from github-actions[bot], so we never
# commit the badge to main. The README's Shields endpoint reads from `badges`.

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aislop:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: AI slop scan + badge
        id: badge
        uses: sandwichfarm/aislop-badge@v1
        with:
          aislop-version: "0.12.0"
          badge-file: .github/badges/aislop-score.json
          # Gate on the score so genuine code-slop regressions fail the run, but
          # don't hard-fail on aislop's non-zero exit: the only non-code findings
          # are external dependency advisories (a live, moving target) and the
          # in-repo engines (formatting, quality, ai-slop, linting) are clean.
          minimum-score: "70"
          fail-on-error: "false"
          # Write the badge JSON only — never commit/push it to main (forbidden
          # by the main ruleset). The publish step below pushes it to `badges`.
          commit-badge: "false"
          push: "false"

      - name: Publish badge to the unprotected `badges` branch
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          git clone --depth 1 --branch badges \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tmp"
          cp .github/badges/aislop-score.json "$tmp/aislop-score.json"
          cd "$tmp"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aislop-score.json
          if git diff --staged --quiet; then
            echo "AI slop badge unchanged — nothing to publish."
          else
            git commit -m "chore: update AI slop badge [skip ci]"
            git push origin badges
          fi
