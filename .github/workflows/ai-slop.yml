name: AI Slop Score

"on":
  push:
    branches:
      - main
    paths-ignore:
      - ".github/badges/aislop-score.json"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.aislop.outputs.exit_code }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Run AI slop scan
        id: aislop
        shell: bash
        run: |
          set +e
          pnpm dlx aislop@0.10.2 scan --json . > aislop-report.json
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Generate score badge source
        shell: bash
        run: |
          mkdir -p .github/badges
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const report = JSON.parse(fs.readFileSync('aislop-report.json', 'utf8'));
          const score = Number(report.score ?? 0);
          const label = String(report.label ?? 'unknown');
          const color =
            score >= 90 ? 'brightgreen' :
            score >= 80 ? 'green' :
            score >= 70 ? 'yellowgreen' :
            score >= 60 ? 'yellow' :
            score >= 50 ? 'orange' :
            'red';

          fs.writeFileSync(
            '.github/badges/aislop-score.json',
            `${JSON.stringify({
              schemaVersion: 1,
              label: 'ai slop',
              message: `${score}/100 ${label}`,
              color,
            }, null, 2)}\n`,
          );
          NODE

      - name: Upload badge source
        uses: actions/upload-artifact@v4
        with:
          name: aislop-score-badge
          path: .github/badges/aislop-score.json

  update-badge:
    name: Update Badge
    needs: scan
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download badge source
        uses: actions/download-artifact@v4
        with:
          name: aislop-score-badge
          path: .github/badges

      - name: Commit badge source
        shell: bash
        run: |
          if git diff --quiet -- .github/badges/aislop-score.json; then
            echo "AI slop score badge is up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/aislop-score.json
          git commit -m "chore: update AI slop score badge [skip ci]"
          git push

  enforce:
    name: Enforce
    needs:
      - scan
      - update-badge
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Fail if AI slop scan failed
        shell: bash
        run: |
          if [ "${{ needs.scan.result }}" != "success" ]; then
            echo "AI slop scan job failed."
            exit 1
          fi

          if [ "${{ needs.update-badge.result }}" = "failure" ] || [ "${{ needs.update-badge.result }}" = "cancelled" ]; then
            echo "AI slop badge update job failed."
            exit 1
          fi

          exit_code="${{ needs.scan.outputs.exit_code }}"
          if [ "$exit_code" != "0" ]; then
            echo "AI slop scan exited with $exit_code."
            exit "$exit_code"
          fi
