name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Cut a GitHub Release per package whose version is now live on npm.
      # Runs only when the publish step above succeeded (default `if: success()`),
      # so a release is never created for a version that failed to deploy. The
      # script is idempotent — it skips packages that already have a release and
      # backfills any published version that is still missing one. We publish
      # with `pnpm publish -r` (not `changeset publish`), so changesets/action's
      # own release creation can't see what shipped; this derives it from npm.
      - name: Publish GitHub Releases
        run: node scripts/github-releases.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
